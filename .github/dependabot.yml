version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      astro:
        applies-to: "version-updates"
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - "minor"
          - "patch"
      react:
        applies-to: "version-updates"
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@astrojs/react"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        applies-to: "version-updates"
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "@astrojs/tailwind"
        update-types:
          - "minor"
          - "patch"
      test-tooling:
        applies-to: "version-updates"
        patterns:
          - "jest"
          - "@jest/*"
          - "ts-jest"
          - "@types/jest"
          - "@playwright/test"
          - "cross-env"
        update-types:
          - "minor"
          - "patch"
      linting:
        applies-to: "version-updates"
        patterns:
          - "prettier"
          - "prettier-plugin-astro"
        update-types:
          - "minor"
          - "patch"
      npm-production:
        applies-to: "version-updates"
        dependency-type: "production"
        update-types:
          - "patch"
      npm-development:
        applies-to: "version-updates"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
